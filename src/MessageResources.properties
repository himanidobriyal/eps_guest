vndr.page.headline.msg = Bidder Registration
vndr.registration.page.note.msg1 = Registration on IREPS website is mandatory for submission of bids against tenders issued through IREPS.  Bidder registration is an online process.
vndr.registration.page.note.msg2 = Firms who intend to register themselves as bidders are required to get a "Class III Digital Signature Certificate with Firm's Name".  The same can be procured from any of the Certifying Authorities (CA's) authorized by Controller of Certifying Authorities (CCA).  Please visit the website of CCA (<a href='http://www.cca.gov.in'><u>www.cca.gov.in</u></a>) for further details.
vndr.registration.page.note.msg3 = Firms are advised to get the Digital Signing Certificate with the same address with which they intend to register themselves on the website.  Firms who are registered/approved with zonal railways or any other approving agencies &nbsp; of Railways (RDSO etc.) should get the Digital Signing Certificates with the same address as mentioned in the records of these registering/approving agencies, and should use the same address for registering themselves on this website to avoid any inconvenience or disputes
vndr.registration.page.note.msg4 = Firms should go through instructions/guidelines issued on the subject, which can be accessed through the <b>Learning Center, FAQ</b> & <b>System Settings</b> links available on the home page in the left navigation block.
vndr.registration.page.note.msg5 = Firms who have arranged the Digital Signing Certificate, and have read and understood the relevant instructions / guidelines should proceed further by clicking on <b>Proceed</b> button below.

