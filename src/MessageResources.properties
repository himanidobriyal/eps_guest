admin.disclaimer.partB= <B>2.</B>\u00A0\tIndian Railways and CRIS makes no representation or warranty of any kind, \u00A0\u00A0\u00A0\u00A0\u00A0express, implied or statutory regarding this web site and/or the data and \u00A0\u00A0\u00A0\u00A0\u00A0information contained or referred to on each page associated with this web site.
admin.disclaimer.partC= <B>3.</B>\u00A0\tIndian Railways and CRIS shall have no responsibility for any damage to User's \u00A0\u00A0\u00A0\u00A0\u00A0computer system or loss of data that result from the download of any content, \u00A0\u00A0\u00A0\u00A0\u00A0materials, information etc. from the site.
admin.disclaimer.partD= <B>4.</B>\u00A0\tThis website may include links to external websites. These links are provided in \u00A0\u00A0\u00A0\u00A0\u00A0order to help you find relevant websites, services and/or products which may be of \u00A0\u00A0\u00A0\u00A0\u00A0interest to you quickly and easily. It is your responsibility to decide whether any \u00A0\u00A0\u00A0\u00A0\u00A0services and/or products available through any of these websites are suitable for \u00A0\u00A0\u00A0\u00A0\u00A0your purposes. CRIS is  not responsible for the owners or operators of these \u00A0\u00A0\u00A0\u00A0\u00A0websites or for any goods or services they supply or for the content of their \u00A0\u00A0\u00A0\u00A0\u00A0websites and does not give or enter into any conditions, warranties or other terms \u00A0\u00A0\u00A0\u00A0\u00A0or representations in relation to any of these or accept any liability in relation to \u00A0\u00A0\u00A0\u00A0\u00A0any of these (including any liability arising out of any claim that the content of any \u00A0\u00A0\u00A0\u00A0\u00A0external website, to which this website includes a link, infringes the intellectual \u00A0\u00A0\u00A0\u00A0\u00A0property rights of any third party).
admin.disclaimer.partE= <B>5.</B>\u00A0\tCRIS/Various Railway Units may make changes to the contents, or to the \u00A0\u00A0\u00A0\u00A0\u00A0information described therein, at any time without any notice. While utmost care is \u00A0\u00A0\u00A0\u00A0\u00A0taken to provide correct and up to date information to the users; however CRIS/ \u00A0\u00A0\u00A0\u00A0\u00A0Indian Railways does not warrant the suitability, reliability, accuracy, \u00A0\u00A0\u00A0\u00A0\u00A0Completeness, availability or timely availability of the information provided on the \u00A0\u00A0\u00A0\u00A0\u00A0site and accepts no responsibility or liability for any error or omission in any \u00A0\u00A0\u00A0\u00A0\u00A0information provided on the site nor does the site claim to cover all the tenders \u00A0\u00A0\u00A0\u00A0\u00A0invited by various Railway Units.
admin.disclaimer.partF= <B>6.</B>\u00A0\tIn case of any variance between what has been stated and that contained in the \u00A0\u00A0\u00A0\u00A0\u00A0Rules, Regulations, Policy Statements etc, the latter shall prevail.

admin.content.CopyRight= \u00A0Copyright \u00A9 2008 Centre for Railway Information Systems, Govt. of India, All rights \u00A0Reserved.<br><br>\u00A0International copyright and trademark laws protect the entire contents of the Site. \u00A0The owner of the copyrights and trademarks is Centre for Railway Information System, \u00A0Chanakyapuri, New Delhi \u2013 110021, India.<br><BR>\u00A0Information provided on this website including software, text, images, graphics, video \u00A0and audio etc. is protected by copyright and other intellectual property laws. \u201CIREPS \u00A0Website\u201D users are permitted to copy some material strictly for their companies & as \u00A0private individuals only. Users must not misuse, republish, retransmit, broadcast, alter \u00A0or tamper Or make available to any third party any part of the data in any form either \u00A0on another Web site, or in any other medium, print, electronic or otherwise, or as part \u00A0of any commercial service without the prior written permission of  CRIS. Users must \u00A0not remove any copyright, trade mark or other intellectual property notices contained \u00A0in the original material from any material copied or printed from the website.


