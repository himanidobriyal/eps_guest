home.body.para1 = This is official portal of Indian Railways for procurement of Goods, Works & Services, Sale of Materials, and Leasing of Assets through the process of E-Tendering, E-Auction or Reverse Auction. The site is developed and maintained by CRIS using the latest technology and security features. Salient security features deployed include asymmetric cryptography, PKI enablement, digital signature, 256 bit 'VeriSign' Extended SSL, apart from standard security features like user name, password, digital authentication, role based  access and privileges, audit trail, time synchronization for all Production servers with IST (acquired from NPL) etc. The data center has been designed to be fully secure using various hardware and software utilities like firewall, Load Balancer, IPS, Antivirus etc. 
home.body.para2 = The site is compliant to IT Act 2000 and follows the instructions/ guidelines issued by Ministry of Railways from time to time for procurement, sale and leasing. Security aspects of IREPS website are regularly tested by independent third party viz. M/s STQC, under department of IT (DIT), Government of India. The site provides a secure platform to users for online transactions for procurement and sale. The site caters to requirements of all Zonal Rlys. and Production Units of Indian Railways, and is also being used by PSUs like Konkan Railway Corporation Limited (KRCL), and Delhi Metro Rail Corporation (DMRC) etc.
