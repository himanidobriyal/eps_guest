admin.termsCond.Desc2= Please read the \u00A0\u00A0following information carefully. Do not complete your registration and use the E-\u00A0\u00A0procurement portal without agreeing to comply with all of the user's terms and \u00A0\u00A0conditions set forth below.By registering for a user name and password, you agree to \u00A0\u00A0abide by all of the user's terms and conditions set forth below.

admin.termsCond.partA= <b>1. Modification of terms of Agreement\:<br></b>\u00A0\u00A0\u00A0CRIS reserves the right to add or change/modify the terms and condition of this \u00A0\u00A0\u00A0Agreement. Changes could be made by \tCRIS after the first posting to the Site and \u00A0\u00A0\u00A0you will be deemed to have accepted those changes if you continue to access the \u00A0\u00A0\u00A0Site after the first posting.

admin.termsCond.partB= <b>2. </b><B>Bidder Registration, Password and Security\:</B><br></br>\u00A0\u00A0\u00A0Upon successful completion of Registration online, User ID and Password will be \u00A0\u00A0\u00A0registered. You can log-in only in secure mode (SSL) by submitting your User name \u00A0\u00A0\u00A0and Password. Secure transactions can be done only by signing with Digital \u00A0\u00A0\u00A0Signature. <br>\u00A0\u00A0\u00A0You are responsible for maintaining the confidentiality of the password and account, \u00A0\u00A0\u00A0and are fully responsible for all activities that occur under your password or \u00A0\u00A0\u00A0account. You are also responsible for safekeeping of your digital signature certificate \u00A0\u00A0\u00A0and password of USB token/ smart card. You agree to <br><B>\u00A0\u00A0\u00A0a.</B> Immediately notify CRIS of ;any unauthorized use of your password or account or \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0any other breach of security. \u00A0\u00A0\u00A0 <br><B>\u00A0\u00A0\u00A0b.</B> ensure that you log-out from your account at the end of each session. CRIS will \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0not be liable for any loss or damage arising from your failure to comply with the \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0above prescription. It will be solely your responsibility to notify loss of your digital \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0certificate to CA\u2019s as per guidelines issued by CCA/CA etc.<br>\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0Registered user can always modify or update their profile as and when required at \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0their discretion [Except \u2018User ID\u2019 and \u2018Company name\u2019].

admin.termsCond.partC= <b>3.</b>\u00A0<B>Protection\:</B> <br>\u00A0\u00A0\u00A0Personal details provided to Indian Railway E-Procurement System (IREPS) through \u00A0\u00A0\u00A0this website will only be used in accordance with our Privacy Policy. Please read this \u00A0\u00A0\u00A0carefully before using this website. By providing your personal details to us you are \u00A0\u00A0\u00A0consenting to its use in accordance with our Privacy Policy.

admin.termsCond.partD= <b>4.</b>\u00A0<B>System Requirements\:</B>  <br>\u00A0\u00A0\u00A0It is user\u2019s responsibility to comply with the system requirements\: hardware, \u00A0\u00A0\u00A0software, Internet connectivity at their premises to access IREPS website. CRIS is \u00A0\u00A0\u00A0not responsible for non-compliance for the above by user. For easy accessing the \u00A0\u00A0\u00A0required system requirements etc, Vendors must use any computer having Windows \u00A0\u00A0\u00A02000 or Windows XP or Windows Vista versions of Window operating system and any \u00A0\u00A0\u00A0suitable web browser along with suitable Internet connections.CRIS makes no \u00A0\u00A0\u00A0warranty that the Site will be available on an uninterrupted or error-free basis. \u00A0\u00A0\u00A0Speed of site/ data transfer speed etc. as accessed from user machine may vary \u00A0\u00A0\u00A0from time to time for reasons beyond control of CRIS.

admin.termsCond.partE= <b>5.</b>\u00A0<B>Changes In Operation Of This Website\:</B><br>\u00A0\u00A0\u00A0\u2022\tCRIS reserves the right to modify, add, delete, discontinue and/or change the \u00A0\u00A0\u00A0\u00A0\u00A0contents and classification and presentation of the information at any time.<br>\u00A0\u00A0\u00A0\u2022\tCRIS may suspend the operation of this website for support or maintenance work, \u00A0\u00A0\u00A0\u00A0\u00A0in order to update the content or for any other reason. <br>\u00A0\u00A0\u00A0\u2022\tCRIS reserves the right to terminate access to this website at any time and \u00A0\u00A0\u00A0\u00A0\u00A0without notice to any user or group of users.

admin.termsCond.partF= <b>6.</b>\u00A0<B>Contents of Tender and Auction Notice Information\:</B><br>\u00A0\u00A0\u00A0Tenders / Auction Notices shall be published by the authorized Authorities of the \u00A0\u00A0\u00A0respective Railway Units. CRIS is not responsible for the information provided in the \u00A0\u00A0\u00A0tenders / auction notices published by respective Railway Units or any other \u00A0\u00A0\u00A0information uploaded by them. In case of any clarifications arising out of the \u00A0\u00A0\u00A0tenders / auctions, the users have to contact the respective Tender Inviting/ \u00A0\u00A0\u00A0Auctioning Authority of that Railway Unit.

admin.termsCond.partG= <b>7.</b> <B>Bid Submission Acknowledgement\:</B><br>\u00A0\u00A0\u00A0The user should complete all the processes and steps required for Bid submission. \u00A0\u00A0\u00A0The successful Bid submission can be ascertained once acknowledgement is given by \u00A0\u00A0\u00A0the system and \u2018Bid Id\u2019 generated, after completing all the processes and steps. \u00A0\u00A0\u00A0Railways and CRIS are not responsible for incomplete bid submission by users. Bid \u00A0\u00A0\u00A0submission will not be considered as complete unless the complete bid is received in \u00A0\u00A0\u00A0the system and proper \u2018Bid Id\u2019 is given by the system.

admin.termsCond.partH= <b>8.</b>\u00A0<B>Upload files\:</B> <br>\u00A0\u00A0\u00A0The bidders have to ensure that the files being uploaded by them are free from all \u00A0\u00A0\u00A0kinds of viruses and contain only the relevant information as stated by the tender \u00A0\u00A0\u00A0inviting authorities for the particular tender. If any bidder / company has uploaded / \u00A0\u00A0\u00A0attached irrelevant data, bogus or fabricated certificates towards his qualification \u00A0\u00A0\u00A0requirements to the respective tender, then their registration with IREPS site  will be \u00A0\u00A0\u00A0liable for termination permanently or temporarily by CRIS with out any prior notice.

admin.termsCond.partI= <b>9.</b>\u00A0<B>Governing Law\:</B><br> \u00A0\u00A0\u00A0Terms shall be governed by, and construed in accordance with, Indian laws.The \u00A0\u00A0\u00A0parties irrevocably agree that the courts of Delhi shall have exclusive jurisdiction to \u00A0\u00A0\u00A0settle any dispute which may arise out of, under, or in connection with these Terms \u00A0\u00A0\u00A0or the legal relationship established by them, and for those purposes irrevocably \u00A0\u00A0\u00A0submit all disputes to the jurisdiction of the courts at Delhi.

admin.privacy.heading= Privacy Statements
admin.privacy.comment= CRIS takes your privacy very seriously.

admin.privacy.partA= <b>1.</b>\u00A0  In general, you can visit IREPS website without telling us who you are and without \u00A0\u00A0\u00A0\u00A0\u00A0revealing any information about yourself. There are times, however, when we may \u00A0\u00A0\u00A0\u00A0\u00A0need information from you in order to <br><br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tConduct the specific on-line transaction that you requested.<br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tRespond to queries or requests submitted by you. <br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tProcess orders or applications submitted by you. <br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tAdminister or otherwise carry out our obligations in relation to any agreement you \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0have with us. <br>\t\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tUse of information for the purpose of vendor searches. <br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tAnticipate and resolve problems with any goods or services supplied to/by you. <br>\u00A0\u00A0\u00A0\u00A0\u00A0\u2022\tCreate interface or services that may meet your needs.

admin.privacy.partB= <b>2.</b> Except as set out in this privacy policy, we will not disclose any personally \u00A0\u00A0\u00A0\u00A0identifiable information without your permission unless under the following \u00A0\u00A0\u00A0\u00A0circumstances\: <br><br>\u00A0\u00A0\u00A0\u00A0\u2022\tWe respond to subpoenas, court orders, or legal process, or to establish or \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0exercise our legal rights or defend against legal claims; <br>\u00A0\u00A0\u00A0\u00A0\u2022\tdisclosure to law enforcing agency of the Government on their demand, direction \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0or instruction;<br>\u00A0\u00A0\u00A0\u00A0\u2022\tWe believe it is necessary to share information in order to investigate, prevent, or \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0take action regarding illegal activities, suspected fraud, situations involving   \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0potential threats to the physical safety of any person, or if we believe that such \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0action is necessary to protect and/or defend our rights, property or personal \u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0safety and those of our users/customers etc or as otherwise required by law.

admin.privacy.partC= <b>3.</b> <b>Information Collected\:</b><br>\u00A0\u00A0\u00A0\u00A0When you visit our portal to browse, read pages, or downloads information, we \u00A0\u00A0\u00A0\u00A0automatically collect and store only the following information\: <br><br>\u00A0\u00A0\u00A0\u00A0\u2022\tThe Internet domain and IP address from which you access our portal;<br>\u00A0\u00A0\u00A0\u00A0\u2022\tThe date and time you access our portal; and<br>\u00A0\u00A0\u00A0\u00A0\u2022\tThe pages you visit <br><br>\u00A0\u00A0\u00A0\u00A0If you do not want any personal or business information collected, please do not \u00A0\u00A0\u00A0\u00A0submit  it to us; however, without this information we will be unable to process your \u00A0\u00A0\u00A0\u00A0on-line transaction.

admin.privacy.partD= <b>4.</b> <b>Security\: </b><br>\u00A0\u00A0\u00A0\u00A0We use safe, tested and quality technology for transmitting the received \u00A0\u00A0\u00A0\u00A0information so that quality and privacy of the data is neither impaired nor breached \u00A0\u00A0\u00A0\u00A0and a variety of security technologies and procedures like Password, SSL, PKI, \u00A0\u00A0\u00A0\u00A0Digital Signatures, asymmetric cryptography etc. are applied to protect \u00A0\u00A0\u00A0\u00A0personal/business information from unauthorized access, use or disclosure.<br><br>\u00A0\u00A0\u00A0\u00A0It is your responsibility to keep your password confidential and Digital Signature \u00A0\u00A0\u00A0\u00A0Certificate in a secure manner. Do not share this information with anyone.<br><br>\u00A0\u00A0\u00A0\u00A0We provide you with the facility to view or edit your company\u2019s/personal information \u00A0\u00A0\u00A0\u00A0and such information cannot be viewed by others except by authorized \u00A0\u00A0\u00A0\u00A0CRIS/Railway officials. You will be required to sign in with your credentials in the \u00A0\u00A0\u00A0\u00A0prescribed manner as provided on the sites to verify your authenticity.

admin.privacy.partE= <b>5.</b> <b>Use of your personal information submitted to other websites\: </b><br>\u00A0\u00A0\u00A0\u00A0We cannot be responsible for the privacy policies and practices of other websites \u00A0\u00A0\u00A0\u00A0even if\:<br><br>\u00A0\u00A0\u00A0\u00A0\u2022\tYou accessed the third party website using links from our website; or<br>\u00A0\u00A0\u00A0\u00A0\u2022\tYou linked to our website from a third party website.<br><br>\u00A0\u00A0\u00A0\u00A0We recommend that you check the policy of each site you visit and contact the \u00A0\u00A0\u00A0\u00A0owner or operator of such website if you have any concerns or questions.

admin.privacy.partF= <b>6.</b> <b>AntiSpam policy\: </b><br>\u00A0\u00A0\u00A0\u00A0IREPS reserves the right to reject and/or report any suspicious spam emails, to the \u00A0\u00A0\u00A0\u00A0authorities concerned, for necessary action, from time to time.

admin.privacy.partG= <b>7.</b> <b>Use of Cookies\:</b><br>\u00A0\u00A0\u00A0\u00A0We do not use cookies to track information about a user's movements throughout \u00A0\u00A0\u00A0\u00A0our site. However, when making a purchase, users are redirected to our payment \u00A0\u00A0\u00A0\u00A0processing service that may use and/or require the use of cookies for making online \u00A0\u00A0\u00A0\u00A0transactions.

admin.privacy.partH= <b>8.</b> <b>Chats</b><br>\u00A0\u00A0\u00A0\u00A0If at any time this site offers any chat rooms etc. we may collect the information \u00A0\u00A0\u00A0\u00A0that you disclose. Such information will be used in accordance with this privacy \u00A0\u00A0\u00A0\u00A0policy. Please note that we cannot be responsible for other parties' use of the \u00A0\u00A0\u00A0\u00A0personal information which you make available to such third parties through any \u00A0\u00A0\u00A0\u00A0chat room etc. on this site. Please be careful about what personal information you \u00A0\u00A0\u00A0\u00A0disclose in this way

admin.privacy.partI= <b>9.</b> <b>Change In Privacy Policy</b><br>\u00A0\u00A0\u00A0\u00A0From time to time we may make changes to this privacy policy. If we make any \u00A0\u00A0\u00A0\u00A0substantial changes to this privacy policy and the way in which we use your \u00A0\u00A0\u00A0\u00A0personal data we will post these changes on this page.

admin.privacy.partJ= <b>10.</b> <b>Comments and Questions </b><br>\u00A0\u00A0\u00A0\u00A0If you have any questions about this Privacy Statement, please send an email to \u00A0\u00A0\u00A0\u00A0helpdesk@cris.org.in or in writing to\: Centre For Railway Information Systems, \u00A0\u00A0\u00A0\u00A0Chankyapuri, New Delhi, PIN \u2013 110021.


